name: Daily Word of the Day Post

on:
  schedule:
    - cron: "0 8 * * *" # 8am UTC daily
  workflow_dispatch:
    inputs:
      index:
        description: "Word index override. Leave empty for today's word."
        required: false
        type: string
      dry_run:
        description: "Dry run (render only, no posting)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Run auto-post
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: arday-media
          R2_PUBLIC_URL: https://pub-58bffa2d8e424cdfa2d9f8112fa9c353.r2.dev
          R2_ENDPOINT: https://dd555ff42829257cc6957a1d9a0371f5.r2.cloudflarestorage.com
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ inputs.index }}" ]; then
            FLAGS="$FLAGS --index ${{ inputs.index }}"
          fi
          npx ts-node scripts/auto-post.ts $FLAGS

      - name: Update README status
        if: success()
        run: npx ts-node scripts/update-readme.ts

      - name: Commit status update
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md out/ab-test-log.json || true
          git diff --staged --quiet || git commit -m "Update daily post status [skip ci]"
          git push

      - name: Upload rendered assets (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-word-assets
          path: |
            out/daily-*
            out/ab-test-log.json
          retention-days: 7
