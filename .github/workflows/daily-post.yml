name: Daily Word of the Day Post

on:
  schedule:
    - cron: "0 8 * * *" # 8am UTC daily
  workflow_dispatch:
    inputs:
      index:
        description: "Word index override. Leave empty for today's word."
        required: false
        type: string
      dry_run:
        description: "Dry run (render only, no posting)"
        required: false
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Run auto-post
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ inputs.index }}" ]; then
            FLAGS="$FLAGS --index ${{ inputs.index }}"
          fi
          npx ts-node scripts/auto-post.ts $FLAGS

      - name: Upload rendered image (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-word-assets
          path: |
            out/daily-*
            out/ab-test-log.json
          retention-days: 7
