name: Weekly A/B Test Report

on:
  schedule:
    - cron: "0 9 * * 0" # Every Sunday at 9am UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate A/B report
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: npx ts-node scripts/ab-report.ts

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/ab-report.json out/ab-test-log.json || true
          git diff --staged --quiet || git commit -m "Update weekly A/B test report [skip ci]"
          git push
